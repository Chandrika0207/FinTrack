<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Tracker DBMS</title>
  <link rel="stylesheet" href="style.css"> <!-- External CSS -->
</head>
<body>
  <header>
    <h1>Finance Tracking System</h1>
  </header>

  <div class="grid">
    <!-- Supplier -->
    <div class="entity-box">
      <div class="entity-title" onclick="toggleBox(this)">Supplier</div>
      <div class="entity-content">
        <div class="form-section">
          <h3>Insert Supplier</h3>
          <form action="supplier_insert.php" method="POST">
            <input type="text" name="supplier_id" placeholder="Supplier ID" required>
            <input type="text" name="name" placeholder="Name" required>
            <input type="text" name="contact_info" placeholder="Contact Info">
            <input type="text" name="address" placeholder="Address">
            <button type="submit">Insert</button>
          </form>
        </div>
        <div class="form-section">
          <h3>Delete Supplier</h3>
          <form action="supplier_delete.php" method="POST">
            <input type="text" name="supplier_id" placeholder="Supplier ID to Delete" required>
            <button type="submit">Delete</button>
          </form>
        </div>
      </div>
    </div>

    <!-- Products -->
    <div class="entity-box">
      <div class="entity-title" onclick="toggleBox(this)">Products</div>
      <div class="entity-content">
        <div class="form-section">
          <h3>Insert Product</h3>
          <form action="products_insert.php" method="POST">
            <input type="text" name="product_id" placeholder="Product ID" required>
            <input type="text" name="product_name" placeholder="Product Name" required>
            <input type="number" name="price" placeholder="Price" required>
            <input type="text" name="category" placeholder="Category">
            <button type="submit">Insert</button>
          </form>
        </div>
        <div class="form-section">
          <h3>Delete Product</h3>
          <form action="products_delete.php" method="POST">
            <input type="text" name="product_id" placeholder="Product ID to Delete" required>
            <button type="submit">Delete</button>
          </form>
        </div>
      </div>
    </div>

    <!-- Customer -->
    <div class="entity-box">
      <div class="entity-title" onclick="toggleBox(this)">Customer</div>
      <div class="entity-content">
        <div class="form-section">
          <h3>Insert Customer</h3>
          <form action="customer_insert.php" method="POST">
            <input type="text" name="customer_id" placeholder="Customer ID" required>
            <input type="text" name="name" placeholder="Name" required>
            <input type="text" name="contact_info" placeholder="Contact Info">
            <button type="submit">Insert</button>
          </form>
        </div>
        <div class="form-section">
          <h3>Delete Customer</h3>
          <form action="customer_delete.php" method="POST">
            <input type="text" name="customer_id" placeholder="Customer ID to Delete" required>
            <button type="submit">Delete</button>
          </form>
        </div>
      </div>
    </div>

    <!-- Bill -->
    <div class="entity-box">
      <div class="entity-title" onclick="toggleBox(this)">Bill</div>
      <div class="entity-content">
        <div class="form-section">
          <h3>Insert Bill</h3>
          <form action="bill_insert.php" method="POST">
            <input type="text" name="bill_id" placeholder="Bill ID" required>
            <input type="number" name="unit_price" placeholder="Unit Price">
            <input type="number" name="total_items" placeholder="Total Items">
            <input type="number" name="total_amount" placeholder="Total Amount">
            <input type="number" name="tax_amount" placeholder="Tax Amount">
            <input type="text" name="payment_method" placeholder="Payment Method">
            <button type="submit">Insert</button>
          </form>
        </div>
        <div class="form-section">
          <h3>Delete Bill</h3>
          <form action="bill_delete.php" method="POST">
            <input type="text" name="bill_id" placeholder="Bill ID to Delete" required>
            <button type="submit">Delete</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script> <!-- External JS -->
</body>
</html>
